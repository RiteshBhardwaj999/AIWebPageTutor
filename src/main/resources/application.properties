# ===========================================
# AI Webpage Tutor - Application Configuration
# ===========================================

spring.application.name=ai-webpage-tutor
server.port=8080

# -------------------------------------------
# Database (H2 for development, switch to PostgreSQL for production)
# -------------------------------------------
# H2 (dev)
spring.datasource.url=jdbc:h2:file:./data/tutordb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL (production) - uncomment and configure for deployment
# spring.datasource.url=jdbc:postgresql://localhost:5432/aiwebpagetutor
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=your_username
# spring.datasource.password=your_password

# -------------------------------------------
# JPA / Hibernate
# -------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------
# JWT Secret (CHANGE THIS in production!)
# -------------------------------------------
jwt.secret=YourSuperSecretKeyThatIsAtLeast32BytesLongForHS256Algorithm!
jwt.expiration=86400000

# -------------------------------------------
# AI Provider (Groq - free, fast, generous limits)
# Get your free key at: https://console.groq.com/keys
# -------------------------------------------
ai.api.base-url=https://api.groq.com/openai/v1
ai.api.key=${AI_API_KEY:YOUR_GROQ_API_KEY_HERE}
ai.api.model=llama-3.3-70b-versatile
