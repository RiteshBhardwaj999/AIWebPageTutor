# ===========================================
# Production Configuration
# ===========================================

# Database handled by DatabaseConfig.java (reads DATABASE_URL)
# Disable all Spring datasource auto-config to prevent conflicts
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable H2
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# AI Provider
ai.api.base-url=${AI_API_BASE_URL:https://api.groq.com/openai/v1}
ai.api.key=${AI_API_KEY}
ai.api.model=${AI_API_MODEL:llama-3.3-70b-versatile}
