# ===========================================
# Production Configuration
# ===========================================

# PostgreSQL (assembled from Render's individual DB properties)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console in production
spring.h2.console.enabled=false

# JWT (set via environment variable)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# AI Provider (set via environment variables)
ai.api.base-url=${AI_API_BASE_URL:https://api.groq.com/openai/v1}
ai.api.key=${AI_API_KEY}
ai.api.model=${AI_API_MODEL:llama-3.3-70b-versatile}
