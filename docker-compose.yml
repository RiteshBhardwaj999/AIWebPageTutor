version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiwebpagetutor
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/aiwebpagetutor
      SPRING_DATASOURCE_USERNAME: tutor
      SPRING_DATASOURCE_PASSWORD: tutor123
      JWT_SECRET: ${JWT_SECRET:-ChangeThisToARandomStringAtLeast32BytesLongForProduction!}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://api.groq.com/openai/v1}
      AI_API_MODEL: ${AI_API_MODEL:-llama-3.3-70b-versatile}
    depends_on:
      - db

volumes:
  pgdata:
