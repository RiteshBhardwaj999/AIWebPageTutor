<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Webpage Tutor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="screen">
    <div class="header">
      <h1>AI Webpage Tutor</h1>
      <p class="subtitle">Your AI learning companion</p>
    </div>

    <div id="login-form" class="form-section">
      <h2>Login</h2>
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-password" placeholder="Password" />
      <button id="login-btn" class="btn primary">Login</button>
      <p class="switch-text">No account? <a href="#" id="show-register">Register</a></p>
    </div>

    <div id="register-form" class="form-section hidden">
      <h2>Register</h2>
      <input type="text" id="reg-name" placeholder="Display Name" />
      <input type="email" id="reg-email" placeholder="Email" />
      <input type="password" id="reg-password" placeholder="Password (min 6 chars)" />
      <button id="register-btn" class="btn primary">Register</button>
      <p class="switch-text">Have an account? <a href="#" id="show-login">Login</a></p>
    </div>

    <div id="auth-error" class="error hidden"></div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard-screen" class="screen hidden">
    <div class="header">
      <h1>AI Webpage Tutor</h1>
      <div class="user-bar">
        <span id="user-name"></span>
        <button id="logout-btn" class="btn small">Logout</button>
      </div>
    </div>

    <div class="instructions">
      <p><strong>How to use:</strong></p>
      <ol>
        <li>Select any text on a webpage</li>
        <li>Click the floating toolbar that appears</li>
        <li>Or right-click and use the "AI Tutor" menu</li>
      </ol>
    </div>

    <div class="dashboard-actions">
      <h3>Quick Actions</h3>
      <button class="btn action" id="btn-history">View Learning History</button>
      <button class="btn action" id="btn-skills">View Skills Tracked</button>
      <button class="btn action" id="btn-recommend">Get Recommendations</button>
      <button class="btn action" id="btn-export-history">Export History (.md)</button>
      <button class="btn action" id="btn-export-cards">Export Flashcards (.md)</button>
      <button class="btn action" id="btn-open-panel">Open Side Panel</button>
    </div>

    <div id="dash-result" class="result-box hidden"></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
